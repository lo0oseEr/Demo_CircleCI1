version: 2.1


jobs:
    build:
        docker:
          - image: cimg/base:current
        steps:
            - checkout
            - run:
                name: Build Application
                command: |
                  echo "Building the application..."
                  mkdir -p build
                  echo "Build completed" > build/output.txt
                  
    test:
        docker:
          - image: cimg/base:current
        steps:
            - checkout
            - run:
                name: Run Tests
                command: |
                  echo "Running tests..."
                  echo "All tests passed successfully"

    deploy:
        docker:
            - image: cimg/base:current
        steps:
            - checkout
            - run:
                name: Deploy Application
                command: |
                  echo "Deploying the application..."
                  echo "Deployment completed successfully"

    
workflows:
  build_test_deploy_pipeline:
    jobs:
        - build
        - test:
            requires:
              - build
        - deploy:
            requires:
              - test